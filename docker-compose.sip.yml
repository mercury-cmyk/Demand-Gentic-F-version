version: '3.8'

services:
  # Drachtio SIP Server Container
  drachtio:
    image: drachtio/drachtio-server:latest
    container_name: drachtio-sip-server
    environment:
      DRACHTIO_DAEMON_PORT: "9022"
      DRACHTIO_LISTEN_PORT: "5060"
      DRACHTIO_LISTEN_HOST: "0.0.0.0"
      DRACHTIO_TLS_PORT: "5061"
      DRACHTIO_LOG_LEVEL: "info"
    volumes:
      - ./drachtio.conf:/etc/drachtio/drachtio.conf
      - drachtio-logs:/var/log/drachtio
    restart: unless-stopped
    ports:
      - "5060:5060/udp"
      - "5061:5061/udp"
      - "9022:9022"
    healthcheck:
      test: ["CMD", "netstat", "-an", "|", "grep", "5060"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - sip-network

  # Coturn STUN/TURN Server
  coturn:
    image: coturn/coturn:latest
    container_name: coturn-turn-server
    environment:
      PUBLIC_IP: ${PUBLIC_IP}
      PRIVATE_IP: ${PRIVATE_IP}
      TURN_USERNAME: ${TURN_USERNAME:-turnuser}
      TURN_PASSWORD: ${TURN_PASSWORD:-turnpass}
      REALM: ${REALM:-turnserver.example.com}
    volumes:
      - ./coturn.conf:/etc/coturn/turnserver.conf
      - coturn-logs:/var/log/coturn
    restart: unless-stopped
    ports:
      - "3478:3478/udp"
      - "3478:3478/tcp"
      - "5349:5349/udp"
      - "5349:5349/tcp"
    networks:
      - sip-network

  # Main Application (SIP Dialer + Media Processing)
  app:
    build:
      context: .
      dockerfile: Dockerfile.sip
    container_name: demandgentic-sip-app
    environment:
      NODE_ENV: production
      DRACHTIO_HOST: localhost
      DRACHTIO_PORT: "9022"
      SIP_LISTEN_PORT: "5060"
      SIP_LISTEN_HOST: "0.0.0.0"
      PUBLIC_IP: ${PUBLIC_IP}
      RTP_PORT_MIN: "10000"
      RTP_PORT_MAX: "20000"
      STUN_SERVERS: ${STUN_SERVERS:-stun:stun.l.google.com:19302,stun:stun1.l.google.com:19302}
      TURN_SERVERS: ${TURN_SERVERS:-[{"urls":["turn:localhost:3478"],"username":"turnuser","credential":"turnpass"}]}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
    depends_on:
      drachtio:
        condition: service_healthy
      coturn:
        condition: service_started
    volumes:
      - ./server:/app/server
      - app-logs:/app/logs
    ports:
      - "5000:5000"
      - "10000-20000:10000-20000/udp"
    restart: unless-stopped
    networks:
      - sip-network

  # Optional: PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: demandgentic-db
    environment:
      POSTGRES_DB: demandgentic
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    networks:
      - sip-network

  # Optional: Redis Cache
  redis:
    image: redis:7-alpine
    container_name: demandgentic-redis
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks:
      - sip-network

networks:
  sip-network:
    driver: bridge

volumes:
  drachtio-logs:
  coturn-logs:
  app-logs:
  postgres-data:
  redis-data:
