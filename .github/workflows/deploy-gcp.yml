name: Deploy to GCP Cloud Run

on:
  push:
    branches:
      - main
      - staging
  workflow_dispatch:

env:
  PROJECT_ID: pivotalcrm-2026
  REGION: us-central1
  SERVICE: pivotalcrm-service
  REPOSITORY: pivotal-artifacts

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      id-token: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
      
      - name: Configure Docker authentication
        run: |
          gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev
      
      - name: Build Docker image
        run: |
          docker build -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE }}:${{ github.sha }} .
      
      - name: Push to Artifact Registry
        run: |
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE }}:${{ github.sha }}
      
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE }} \
            --image=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE }}:${{ github.sha }} \
            --region=${{ env.REGION }} \
            --platform=managed \
            --allow-unauthenticated \
            --set-env-vars="NODE_ENV=production,PORT=5000" \
            --max-instances=100 \
            --memory=512Mi \
            --cpu=1
      
      - name: Get service URL
        run: |
          gcloud run services describe ${{ env.SERVICE }} \
            --region=${{ env.REGION }} \
            --format='value(status.url)'

  smoke-tests:
    runs-on: ubuntu-latest
    needs: deploy
    
    steps:
      - name: Get Cloud Run URL
        id: fetch-url
        run: |
          SERVICE_URL=$(gcloud run services describe pivotalcrm-service \
            --region=us-central1 \
            --format='value(status.url)')
          echo "service_url=$SERVICE_URL" >> $GITHUB_OUTPUT
      
      - name: Test health endpoint
        run: |
          curl -f -s "${{ steps.fetch-url.outputs.service_url }}/api/health" || exit 1
      
      - name: Test API connectivity
        run: |
          curl -f -s "${{ steps.fetch-url.outputs.service_url }}/api/status" || exit 1
