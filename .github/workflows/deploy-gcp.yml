name: Deploy to GCP Cloud Run

on:
  # Auto-deploy disabled — use deploy-gcloud.sh or Cloud Build instead
  # push:
  #   branches:
  #     - main
  #     - staging
  workflow_dispatch:

env:
  PROJECT_ID: pivotalb2b-2026
  REGION: us-central1
  SERVICE: demandgentic-api
  REPOSITORY: cloud-run-source-deploy

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      id-token: write

    outputs:
      service_url: ${{ steps.get-url.outputs.url }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Validate and normalize GCP credentials
        id: prep-creds
        run: |
          set -euo pipefail

          RAW_JSON='${{ secrets.GCP_SA_KEY_JSON }}'
          FALLBACK='${{ secrets.GCP_SA_KEY }}'
          CREDENTIALS="${RAW_JSON:-$FALLBACK}"

          if [[ -z "$CREDENTIALS" ]]; then
            echo "ERROR: No GCP credentials secret configured."
            echo "To fix this:"
            echo "1. Go to Settings > Secrets and variables > Actions"
            echo "2. Add either 'GCP_SA_KEY_JSON' (raw JSON) or 'GCP_SA_KEY' (raw JSON or base64 JSON)"
            exit 1
          fi

          if [[ "${CREDENTIALS:0:1}" == "{" ]]; then
            printf '%s' "$CREDENTIALS" > "$RUNNER_TEMP/gcp-key.json"
          else
            printf '%s' "$CREDENTIALS" | base64 --decode > "$RUNNER_TEMP/gcp-key.json"
          fi

          python - <<'PY'
          import json, os
          path = os.path.join(os.environ["RUNNER_TEMP"], "gcp-key.json")
          with open(path, "r", encoding="utf-8") as f:
              data = json.load(f)

          required = ["type", "project_id", "client_email", "private_key"]
          missing = [k for k in required if not data.get(k)]
          if missing:
              raise SystemExit(f"Missing required key fields: {', '.join(missing)}")

          if data["type"] != "service_account":
              raise SystemExit("Credentials are not a service_account JSON key")

          expected_project = os.environ["PROJECT_ID"]
          if data["project_id"] != expected_project:
              raise SystemExit(
                  f"Service account project_id ({data['project_id']}) does not match PROJECT_ID ({expected_project})"
              )
          print("GCP credentials validated")
          PY

          {
            echo "credentials_json<<EOF"
            cat "$RUNNER_TEMP/gcp-key.json"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ steps.prep-creds.outputs.credentials_json }}
      
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
      
      - name: Configure Docker authentication
        run: |
          gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev

      - name: Validate Artifact Registry repository
        run: |
          gcloud artifacts repositories describe ${{ env.REPOSITORY }} \
            --location=${{ env.REGION }} \
            --project=${{ env.PROJECT_ID }}
      
      - name: Build Docker image
        run: |
          docker build \
            --build-arg NODE_OPTIONS="--max-old-space-size=4096" \
            -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE }}:${{ github.sha }} \
            -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE }}:latest \
            .
      
      - name: Push to Artifact Registry
        run: |
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE }}:${{ github.sha }}
      
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE }} \
            --image=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE }}:${{ github.sha }} \
            --region=${{ env.REGION }} \
            --platform=managed \
            --allow-unauthenticated \
            --vpc-connector=pivotal-connector \
            --vpc-egress=private-ranges-only \
            --set-env-vars="NODE_ENV=production,TELNYX_NUMBER_POOL_ENABLED=true,TELNYX_TEXML_APP_ID=2870970047591876264,VOICE_PROVIDER=google,VOICE_PROVIDER_FALLBACK=true,VOICE_PROVIDER_FALLBACK_TARGET=openai,GEMINI_LIVE_MODEL=gemini-live-2.5-flash-native-audio,USE_VERTEX_AI=true,GOOGLE_CLOUD_PROJECT=pivotalb2b-2026,GCP_PROJECT_ID=pivotalb2b-2026,GCS_PROJECT_ID=pivotalb2b-2026,GCS_BUCKET=demandgentic-storage,BASE_URL=https://demandgentic.ai,PUBLIC_TEXML_HOST=demandgentic.ai,DEEPGRAM_MODEL=nova-2-phonecall,DEEPGRAM_LANGUAGE=en-US,CONVERSATION_QUALITY_MODEL=deepseek-chat,CALL_EXECUTION_ENABLED=true,GLOBAL_MAX_CONCURRENT_CALLS=100,MAX_CONCURRENT_CALLS=100,ENABLE_LOG_STREAMING=true" \
            --set-secrets="DATABASE_URL=DATABASE_URL:latest,JWT_SECRET=JWT_SECRET:latest,SESSION_SECRET=SESSION_SECRET:latest,OPENAI_API_KEY=OPENAI_API_KEY:latest,AI_INTEGRATIONS_OPENAI_API_KEY=AI_INTEGRATIONS_OPENAI_API_KEY:latest,AI_INTEGRATIONS_OPENAI_BASE_URL=AI_INTEGRATIONS_OPENAI_BASE_URL:latest,AI_INTEGRATIONS_ANTHROPIC_API_KEY=AI_INTEGRATIONS_ANTHROPIC_API_KEY:latest,AI_INTEGRATIONS_GEMINI_API_KEY=AI_INTEGRATIONS_GEMINI_API_KEY:latest,AI_INTEGRATIONS_GEMINI_BASE_URL=AI_INTEGRATIONS_GEMINI_BASE_URL:latest,BRAVE_SEARCH_API_KEY=BRAVE_SEARCH_API_KEY:latest,EMAIL_LIST_VERIFY_API_KEY=EMAIL_LIST_VERIFY_API_KEY:latest,PSE_GOOGLE=PSE_GOOGLE:latest,GOOGLE_SEARCH_ENGINE_ID=GOOGLE_SEARCH_ENGINE_ID:latest,GOOGLE_SEARCH_API_KEY=GOOGLE_SEARCH_API_KEY:latest,GEMINI_API_KEY=GEMINI_API_KEY:latest,MICROSOFT_CLIENT_ID=MICROSOFT_CLIENT_ID:latest,MICROSOFT_CLIENT_SECRET=MICROSOFT_CLIENT_SECRET:latest,MICROSOFT_TENANT_ID=MICROSOFT_TENANT_ID:latest,COMPANIES_HOUSE_API_KEY=COMPANIES_HOUSE_API_KEY:latest,GOOGLE_AUTH_CLIENT_ID=GOOGLE_AUTH_CLIENT_ID:latest,GOOGLE_CLIENT_SECRET=GOOGLE_CLIENT_SECRET:latest,TELNYX_SIP_CONNECTION_ID=TELNYX_SIP_CONNECTION_ID:latest,TELNYX_SIP_PASSWORD=TELNYX_SIP_PASSWORD:latest,TELNYX_SIP_USERNAME=TELNYX_SIP_USERNAME:latest,TELNYX_API_KEY=TELNYX_API_KEY:latest,TELNYX_CALL_CONTROL_APP_ID=TELNYX_CALL_CONTROL_APP_ID:latest,TELNYX_FROM_NUMBER=TELNYX_FROM_NUMBER:latest,TELNYX_WEBHOOK_URL=TELNYX_WEBHOOK_URL:latest,PUBLIC_WEBSOCKET_URL=PUBLIC_WEBSOCKET_URL:latest,ELEVENLABS_API_KEY=ELEVENLABS_API_KEY:latest,ELEVENLABS_WEBHOOK_SECRET=ELEVENLABS_WEBHOOK_SECRET:latest,REDIS_URL=REDIS_URL:latest,MAILGUN_API_KEY=MAILGUN_API_KEY:latest,MAILGUN_DOMAIN=MAILGUN_DOMAIN:latest,DEEPSEEK_API_KEY=DEEPSEEK_API_KEY:latest,ORG_INTELLIGENCE_OPENAI_MODEL=ORG_INTELLIGENCE_OPENAI_MODEL:latest,PUBLIC_WEBHOOK_HOST=PUBLIC_WEBHOOK_HOST:latest,TELNYX_CONNECTION_ID=TELNYX_CONNECTION_ID:latest,SECRET_MANAGER_MASTER_KEY=SECRET_MANAGER_MASTER_KEY:latest,PGDATABASE=PGDATABASE:latest,PGHOST=PGHOST:latest,PGPORT=PGPORT:latest,PGUSER=PGUSER:latest,PGPASSWORD=PGPASSWORD:latest,DEEPGRAM_API_KEY=DEEPGRAM_API_KEY:latest,OPENAI_WEBHOOK_SECRET=OPENAI_WEBHOOK_SECRET:latest" \
            --max-instances=10 \
            --min-instances=1 \
            --memory=2Gi \
            --cpu=2 \
            --startup-cpu-boost \
            --concurrency=1000
      
      - name: Get service URL
        id: get-url
        run: |
          SERVICE_URL=$(gcloud run services describe ${{ env.SERVICE }} \
            --region=${{ env.REGION }} \
            --format='value(status.url)')
          echo "url=$SERVICE_URL" >> $GITHUB_OUTPUT

  smoke-tests:
    runs-on: ubuntu-latest
    needs: deploy
    
    steps:
      - name: Test health endpoint
        run: |
          curl -f -s "${{ needs.deploy.outputs.service_url }}/api/health" || exit 1
      
      - name: Test readiness endpoint
        run: |
          curl -f -s "${{ needs.deploy.outputs.service_url }}/api/ready" || exit 1
