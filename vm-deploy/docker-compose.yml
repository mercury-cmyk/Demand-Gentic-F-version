services:
  # Nginx reverse proxy — SSL termination, serves static + proxies API
  nginx:
    image: nginx:alpine
    container_name: dg_nginx
    network_mode: host
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/nginx/ssl:ro
      - certbot-webroot:/var/www/certbot:ro
    depends_on:
      api:
        condition: service_healthy

  # Main API server — Express + Vite SSR + background jobs + orchestrator
  api:
    build:
      context: ..
      dockerfile: Dockerfile
    image: demandgentic-api:latest
    container_name: dg_api
    network_mode: host
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - PORT=8080
      - HOST=0.0.0.0
      - NODE_ENV=production
      - OPS_HUB_DEPLOY_TARGET=vm
      - VM_OPS_AGENT_URL=http://127.0.0.1:8383
      # Internal: media bridge is on the same host
      - MEDIA_BRIDGE_HOST=127.0.0.1
      - MEDIA_BRIDGE_PORT=8090
      - MEDIA_BRIDGE_SECRET=bridge-secret
      # SIP: Drachtio is on the same host
      - DRACHTIO_HOST=127.0.0.1
      - DRACHTIO_PORT=9022
      - DRACHTIO_SECRET=cymru
      - GOOGLE_APPLICATION_CREDENTIALS=/app/gcp-service-account.json
    volumes:
      - ../gcp-service-account.json:/app/gcp-service-account.json:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "--max-time", "10", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 15s
      start_period: 45s
      retries: 5

  # Ops agent - host-side file editing and deployment control for Ops Hub
  ops-agent:
    build:
      context: ..
      dockerfile: vm-deploy/ops-agent.Dockerfile
    container_name: dg_ops_agent
    network_mode: host
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - OPS_AGENT_HOST=127.0.0.1
      - OPS_AGENT_PORT=8383
      - OPS_AGENT_WORKSPACE_ROOT=/workspace
    volumes:
      - ..:/workspace
      - /var/run/docker.sock:/var/run/docker.sock

  # Drachtio SIP server - handles SIP signaling
  drachtio:
    image: drachtio/drachtio-server:latest
    container_name: dg_drachtio
    network_mode: host
    restart: unless-stopped
    command: >
      drachtio
      --contact "sip:*:5060;transport=udp"
      --external-ip 136.116.91.227
      --admin-port 9022
      --admin-secret cymru

  # Media bridge — RTP <-> Gemini Live audio bridging
  media-bridge:
    build:
      context: ../media-bridge
      dockerfile: Dockerfile
    image: media-bridge:latest
    container_name: dg_media_bridge
    network_mode: host
    restart: unless-stopped
    environment:
      - MEDIA_BRIDGE_SECRET=bridge-secret
      - MEDIA_BRIDGE_PORT=8090
      - GOOGLE_CLOUD_PROJECT=gen-lang-client-0789558283
      - GOOGLE_CLOUD_LOCATION=us-central1
      - GEMINI_LIVE_MODEL=gemini-live-2.5-flash-native-audio
      # After migration: callback goes direct to local API, no internet round-trip
      - CLOUD_RUN_API_URL=http://localhost:8080
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # Certbot — auto-renew SSL certificates
  certbot:
    image: certbot/certbot
    container_name: dg_certbot
    volumes:
      - ./nginx/ssl:/etc/letsencrypt
      - certbot-webroot:/var/www/certbot
    entrypoint: /bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done'
    restart: unless-stopped

volumes:
  certbot-webroot:
