# Cloud Run service configuration (for manual deployment or reference)
apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: demandgentic-api
  labels:
    cloud.googleapis.com/location: us-central1
  annotations:
    run.googleapis.com/ingress: all
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "10"
        run.googleapis.com/cpu-throttling: "false"
        run.googleapis.com/startup-cpu-boost: "true"
    spec:
      containerConcurrency: 80
      timeoutSeconds: 300
      serviceAccountName: demandgentic-sa@PROJECT_ID.iam.gserviceaccount.com
      containers:
        - image: gcr.io/PROJECT_ID/demandgentic-api:latest
          ports:
            - containerPort: 8080
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "8080"
            - name: TELNYX_WEBHOOK_URL
              value: "https://demandgentic.ai/api/webhooks/telnyx"
            - name: PUBLIC_WEBSOCKET_URL
              value: "wss://demandgentic.ai/openai-realtime-dialer"
            - name: PUBLIC_WEBHOOK_HOST
              value: "demandgentic.ai"
            - name: BASE_URL
              value: "https://demandgentic.ai"
          resources:
            limits:
              cpu: "1"
              memory: 1Gi
          startupProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8080
            periodSeconds: 30
