# Cloud Run service configuration (for manual deployment or reference)
apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: demandgentic-api
  labels:
    cloud.googleapis.com/location: us-central1
  annotations:
    run.googleapis.com/ingress: all
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "15"
        run.googleapis.com/cpu-throttling: "false"
        run.googleapis.com/startup-cpu-boost: "true"
        run.googleapis.com/vpc-access-connector: projects/PROJECT_ID/locations/us-central1/connectors/pivotal-connector
        run.googleapis.com/vpc-access-egress: private-ranges-only
    spec:
      containerConcurrency: 120
      timeoutSeconds: 900
      serviceAccountName: demandgentic-sa@PROJECT_ID.iam.gserviceaccount.com
      containers:
        - image: gcr.io/PROJECT_ID/demandgentic-api:latest
          ports:
            - containerPort: 8080
          env:
            - name: DO_NOT_TRACK
              value: "true"
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "8080"
            - name: TELNYX_WEBHOOK_URL
              value: "https://demandgentic.ai/api/webhooks/telnyx"
            - name: PUBLIC_WEBSOCKET_URL
              value: "wss://demandgentic.ai/voice-dialer"
            - name: PUBLIC_WEBHOOK_HOST
              value: "demandgentic.ai"
            - name: BASE_URL
              value: "https://demandgentic.ai"
          resources:
            limits:
              cpu: "4"
              memory: 4Gi
          startupProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8080
            periodSeconds: 30
