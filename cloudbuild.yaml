# Google Cloud Build configuration for automated CI/CD
# Trigger: gcloud builds submit --config cloudbuild.yaml .
# Or connect to a Cloud Build trigger for automatic deploys on push.

substitutions:
  _REGION: us-central1
  _IMAGE_NAME: demandgentic-api
  _REPOSITORY: cloud-run-source-deploy
  _IMAGE_TAG: latest

steps:
  # Build the Docker image (using Artifact Registry)
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE_NAME}:${_IMAGE_TAG}'
      - '-t'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE_NAME}:latest'
      - '.'
    timeout: '1200s'

  # Push to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE_NAME}'

  # Deploy demandgentic-voice (Call Intelligence + Recording Management)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'demandgentic-voice'
      - '--image'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE_NAME}:${_IMAGE_TAG}'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--no-allow-unauthenticated'
      - '--cpu'
      - '4'
      - '--memory'
      - '4Gi'
      - '--min-instances'
      - '1'
      - '--max-instances'
      - '50'
      - '--port'
      - '8080'
      - '--timeout'
      - '3600'
      - '--concurrency'
      - '150'
      - '--cpu-boost'
      - '--clear-vpc-connector'
      - '--set-env-vars'
      - 'NODE_ENV=production,TELNYX_NUMBER_POOL_ENABLED=true,TELNYX_TEXML_APP_ID=2870970047591876264,VOICE_PROVIDER=google,VOICE_PROVIDER_FALLBACK=true,VOICE_PROVIDER_FALLBACK_TARGET=openai,GEMINI_LIVE_MODEL=gemini-live-2.5-flash-native-audio,USE_VERTEX_AI=true,GOOGLE_CLOUD_PROJECT=$PROJECT_ID,GCP_PROJECT_ID=$PROJECT_ID,GCS_PROJECT_ID=$PROJECT_ID,GCS_BUCKET=demandgentic-ai-storage,BASE_URL=https://demandgentic.ai,APP_BASE_URL=https://demandgentic.ai,PUBLIC_TEXML_HOST=demandgentic.ai,DEEPGRAM_MODEL=nova-2-phonecall,DEEPGRAM_LANGUAGE=en-US,CONVERSATION_QUALITY_MODEL=deepseek-chat,CALL_EXECUTION_ENABLED=true,GLOBAL_MAX_CONCURRENT_CALLS=50,MAX_CONCURRENT_CALLS=50,ENABLE_LOG_STREAMING=true,APP_GIT_SHA=${_IMAGE_TAG},SERVICE_ROLE=voice,LIVEKIT_URL=wss://demandgentic-wmczsvyo.livekit.cloud,LIVEKIT_SIP_URI=sip:demandgentic-wmczsvyo.sip.livekit.cloud,LIVEKIT_SIP_CONNECTION_ID=2903106223836497802'
      - '--set-secrets'
      - 'DATABASE_URL=DATABASE_URL:latest,JWT_SECRET=JWT_SECRET:latest,SESSION_SECRET=SESSION_SECRET:latest,SECRET_MANAGER_MASTER_KEY=SECRET_MANAGER_MASTER_KEY:latest,OPENAI_API_KEY=OPENAI_API_KEY:latest,OPENAI_WEBHOOK_SECRET=OPENAI_WEBHOOK_SECRET:latest,AI_INTEGRATIONS_OPENAI_API_KEY=AI_INTEGRATIONS_OPENAI_API_KEY:latest,AI_INTEGRATIONS_OPENAI_BASE_URL=AI_INTEGRATIONS_OPENAI_BASE_URL:latest,AI_INTEGRATIONS_ANTHROPIC_API_KEY=AI_INTEGRATIONS_ANTHROPIC_API_KEY:latest,AI_INTEGRATIONS_GEMINI_API_KEY=AI_INTEGRATIONS_GEMINI_API_KEY:latest,AI_INTEGRATIONS_GEMINI_BASE_URL=AI_INTEGRATIONS_GEMINI_BASE_URL:latest,GEMINI_API_KEY=GEMINI_API_KEY:latest,DEEPSEEK_API_KEY=DEEPSEEK_API_KEY:latest,BRAVE_SEARCH_API_KEY=BRAVE_SEARCH_API_KEY:latest,EMAIL_LIST_VERIFY_API_KEY=EMAIL_LIST_VERIFY_API_KEY:latest,PSE_GOOGLE=PSE_GOOGLE:latest,GOOGLE_SEARCH_ENGINE_ID=GOOGLE_SEARCH_ENGINE_ID:latest,GOOGLE_SEARCH_API_KEY=GOOGLE_SEARCH_API_KEY:latest,MICROSOFT_CLIENT_ID=MICROSOFT_CLIENT_ID:latest,MICROSOFT_CLIENT_SECRET=MICROSOFT_CLIENT_SECRET:latest,MICROSOFT_TENANT_ID=MICROSOFT_TENANT_ID:latest,COMPANIES_HOUSE_API_KEY=COMPANIES_HOUSE_API_KEY:latest,GOOGLE_AUTH_CLIENT_ID=GOOGLE_AUTH_CLIENT_ID:latest,GOOGLE_CLIENT_SECRET=GOOGLE_CLIENT_SECRET:latest,TELNYX_API_KEY=TELNYX_API_KEY:latest,TELNYX_CONNECTION_ID=TELNYX_CONNECTION_ID:latest,TELNYX_CALL_CONTROL_APP_ID=TELNYX_CALL_CONTROL_APP_ID:latest,TELNYX_FROM_NUMBER=TELNYX_FROM_NUMBER:latest,TELNYX_SIP_CONNECTION_ID=TELNYX_SIP_CONNECTION_ID:latest,TELNYX_SIP_PASSWORD=TELNYX_SIP_PASSWORD:latest,TELNYX_SIP_USERNAME=TELNYX_SIP_USERNAME:latest,TELNYX_WEBHOOK_URL=TELNYX_WEBHOOK_URL:latest,PUBLIC_WEBSOCKET_URL=PUBLIC_WEBSOCKET_URL:latest,PUBLIC_WEBHOOK_HOST=PUBLIC_WEBHOOK_HOST:latest,ELEVENLABS_API_KEY=ELEVENLABS_API_KEY:latest,ELEVENLABS_WEBHOOK_SECRET=ELEVENLABS_WEBHOOK_SECRET:latest,REDIS_URL=REDIS_URL:latest,MAILGUN_API_KEY=MAILGUN_API_KEY:latest,MAILGUN_DOMAIN=MAILGUN_DOMAIN:latest,DEEPGRAM_API_KEY=DEEPGRAM_API_KEY:latest,ORG_INTELLIGENCE_OPENAI_MODEL=ORG_INTELLIGENCE_OPENAI_MODEL:latest,PGDATABASE=PGDATABASE:latest,PGHOST=PGHOST:latest,PGPORT=PGPORT:latest,PGUSER=PGUSER:latest,PGPASSWORD=PGPASSWORD:latest,LIVEKIT_WEBHOOK_SECRET=LIVEKIT_WEBHOOK_SECRET:latest,LIVEKIT_API_KEY=LIVEKIT_API_KEY:latest,LIVEKIT_API_SECRET=LIVEKIT_API_SECRET:latest'

  # Deploy demandgentic-analysis (Emails + Analysis/Background jobs)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'demandgentic-analysis'
      - '--image'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE_NAME}:${_IMAGE_TAG}'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--cpu'
      - '2'
      - '--memory'
      - '8Gi'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '6'
      - '--port'
      - '8080'
      - '--timeout'
      - '1800'
      - '--concurrency'
      - '30'
      - '--cpu-boost'
      - '--vpc-connector'
      - 'pivotal-connector'
      - '--vpc-egress'
      - 'private-ranges-only'
      - '--set-env-vars'
      - 'NODE_ENV=production,TELNYX_NUMBER_POOL_ENABLED=true,TELNYX_TEXML_APP_ID=2870970047591876264,VOICE_PROVIDER=google,VOICE_PROVIDER_FALLBACK=true,VOICE_PROVIDER_FALLBACK_TARGET=openai,GEMINI_LIVE_MODEL=gemini-live-2.5-flash-native-audio,USE_VERTEX_AI=true,GOOGLE_CLOUD_PROJECT=$PROJECT_ID,GCP_PROJECT_ID=$PROJECT_ID,GCS_PROJECT_ID=$PROJECT_ID,GCS_BUCKET=demandgentic-ai-storage,BASE_URL=https://demandgentic.ai,APP_BASE_URL=https://demandgentic.ai,PUBLIC_TEXML_HOST=demandgentic.ai,DEEPGRAM_MODEL=nova-2-phonecall,DEEPGRAM_LANGUAGE=en-US,CONVERSATION_QUALITY_MODEL=deepseek-chat,CALL_EXECUTION_ENABLED=false,GLOBAL_MAX_CONCURRENT_CALLS=0,MAX_CONCURRENT_CALLS=0,ENABLE_LOG_STREAMING=false,ENABLE_M365_SYNC=false,ENABLE_GMAIL_SYNC=false,APP_GIT_SHA=${_IMAGE_TAG},SERVICE_ROLE=analysis,LIVEKIT_URL=wss://demandgentic-wmczsvyo.livekit.cloud,LIVEKIT_SIP_URI=sip:demandgentic-wmczsvyo.sip.livekit.cloud,LIVEKIT_SIP_CONNECTION_ID=2903106223836497802'
      - '--set-secrets'
      - 'DATABASE_URL=DATABASE_URL:latest,JWT_SECRET=JWT_SECRET:latest,SESSION_SECRET=SESSION_SECRET:latest,SECRET_MANAGER_MASTER_KEY=SECRET_MANAGER_MASTER_KEY:latest,OPENAI_API_KEY=OPENAI_API_KEY:latest,OPENAI_WEBHOOK_SECRET=OPENAI_WEBHOOK_SECRET:latest,AI_INTEGRATIONS_OPENAI_API_KEY=AI_INTEGRATIONS_OPENAI_API_KEY:latest,AI_INTEGRATIONS_OPENAI_BASE_URL=AI_INTEGRATIONS_OPENAI_BASE_URL:latest,AI_INTEGRATIONS_ANTHROPIC_API_KEY=AI_INTEGRATIONS_ANTHROPIC_API_KEY:latest,AI_INTEGRATIONS_GEMINI_API_KEY=AI_INTEGRATIONS_GEMINI_API_KEY:latest,AI_INTEGRATIONS_GEMINI_BASE_URL=AI_INTEGRATIONS_GEMINI_BASE_URL:latest,GEMINI_API_KEY=GEMINI_API_KEY:latest,DEEPSEEK_API_KEY=DEEPSEEK_API_KEY:latest,BRAVE_SEARCH_API_KEY=BRAVE_SEARCH_API_KEY:latest,EMAIL_LIST_VERIFY_API_KEY=EMAIL_LIST_VERIFY_API_KEY:latest,PSE_GOOGLE=PSE_GOOGLE:latest,GOOGLE_SEARCH_ENGINE_ID=GOOGLE_SEARCH_ENGINE_ID:latest,GOOGLE_SEARCH_API_KEY=GOOGLE_SEARCH_API_KEY:latest,MICROSOFT_CLIENT_ID=MICROSOFT_CLIENT_ID:latest,MICROSOFT_CLIENT_SECRET=MICROSOFT_CLIENT_SECRET:latest,MICROSOFT_TENANT_ID=MICROSOFT_TENANT_ID:latest,COMPANIES_HOUSE_API_KEY=COMPANIES_HOUSE_API_KEY:latest,GOOGLE_AUTH_CLIENT_ID=GOOGLE_AUTH_CLIENT_ID:latest,GOOGLE_CLIENT_SECRET=GOOGLE_CLIENT_SECRET:latest,TELNYX_API_KEY=TELNYX_API_KEY:latest,TELNYX_CONNECTION_ID=TELNYX_CONNECTION_ID:latest,TELNYX_CALL_CONTROL_APP_ID=TELNYX_CALL_CONTROL_APP_ID:latest,TELNYX_FROM_NUMBER=TELNYX_FROM_NUMBER:latest,TELNYX_SIP_CONNECTION_ID=TELNYX_SIP_CONNECTION_ID:latest,TELNYX_SIP_PASSWORD=TELNYX_SIP_PASSWORD:latest,TELNYX_SIP_USERNAME=TELNYX_SIP_USERNAME:latest,TELNYX_WEBHOOK_URL=TELNYX_WEBHOOK_URL:latest,PUBLIC_WEBSOCKET_URL=PUBLIC_WEBSOCKET_URL:latest,PUBLIC_WEBHOOK_HOST=PUBLIC_WEBHOOK_HOST:latest,ELEVENLABS_API_KEY=ELEVENLABS_API_KEY:latest,ELEVENLABS_WEBHOOK_SECRET=ELEVENLABS_WEBHOOK_SECRET:latest,REDIS_URL=REDIS_URL:latest,MAILGUN_API_KEY=MAILGUN_API_KEY:latest,MAILGUN_DOMAIN=MAILGUN_DOMAIN:latest,DEEPGRAM_API_KEY=DEEPGRAM_API_KEY:latest,ORG_INTELLIGENCE_OPENAI_MODEL=ORG_INTELLIGENCE_OPENAI_MODEL:latest,PGDATABASE=PGDATABASE:latest,PGHOST=PGHOST:latest,PGPORT=PGPORT:latest,PGUSER=PGUSER:latest,PGPASSWORD=PGPASSWORD:latest,LIVEKIT_WEBHOOK_SECRET=LIVEKIT_WEBHOOK_SECRET:latest,LIVEKIT_API_KEY=LIVEKIT_API_KEY:latest,LIVEKIT_API_SECRET=LIVEKIT_API_SECRET:latest'

images:
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE_NAME}:${_IMAGE_TAG}'
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE_NAME}:latest'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

timeout: '1800s'
