# Google Cloud Build configuration for automated CI/CD
steps:
  # Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/demandgentic-api:latest'
      - '.'
    timeout: '1200s'

  # Push to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/demandgentic-api:latest'

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'demandgentic-api'
      - '--image'
      - 'gcr.io/$PROJECT_ID/demandgentic-api:latest'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--memory'
      - '1Gi'
      - '--cpu'
      - '1'
      - '--min-instances'
      - '1'
      - '--max-instances'
      - '10'
      - '--port'
      - '8080'
      - '--vpc-connector'
      - 'pivotal-connector'
      - '--vpc-egress'
      - 'private-ranges-only'
      - '--set-env-vars'
      - 'NODE_ENV=production,ENABLE_LOG_STREAMING=true,GLOBAL_MAX_CONCURRENT_CALLS=100,MAX_CONCURRENT_CALLS=100,OPENAI_SIP_MODEL=gpt-realtime,OPENAI_SIP_VOICE=marin,OPENAI_SIP_INSTRUCTIONS=You are a professional voice assistant.,OPENAI_SIP_SIDEBAND=true,OPENAI_SIP_SIDEBAND_UPDATE=true,OPENAI_SIP_LOG_EVENTS=false,TELNYX_TEXML_APP_ID=2870970047591876264,TELNYX_NUMBER_POOL_ENABLED=true,GEMINI_LIVE_MODEL=gemini-live-2.5-flash-native-audio,GOOGLE_CLOUD_PROJECT=pivotalb2b-2026,GCP_PROJECT_ID=pivotalb2b-2026,GCS_PROJECT_ID=pivotalb2b-2026,GCS_BUCKET=demandgentic-storage,USE_VERTEX_AI=true,VOICE_PROVIDER=google,VOICE_PROVIDER_FALLBACK=true,VOICE_PROVIDER_FALLBACK_TARGET=openai,BASE_URL=https://demandgentic.ai,CONVERSATION_QUALITY_MODEL=deepseek-chat,DEEPGRAM_MODEL=nova-2-phonecall,DEEPGRAM_LANGUAGE=en-US,PUBLIC_TEXML_HOST=demandgentic-api-657571555590.us-central1.run.app,TELNYX_WEBHOOK_URL=https://demandgentic-api-657571555590.us-central1.run.app/api/webhooks/telnyx,PUBLIC_WEBSOCKET_URL=wss://demandgentic-api-657571555590.us-central1.run.app/voice-dialer,PUBLIC_WEBHOOK_HOST=demandgentic-api-657571555590.us-central1.run.app'
      - '--set-secrets'
      - 'DATABASE_URL=DATABASE_URL:latest,JWT_SECRET=JWT_SECRET:latest,SESSION_SECRET=SESSION_SECRET:latest,SECRET_MANAGER_MASTER_KEY=SECRET_MANAGER_MASTER_KEY:latest,OPENAI_API_KEY=OPENAI_API_KEY:latest,OPENAI_WEBHOOK_SECRET=OPENAI_WEBHOOK_SECRET:latest,AI_INTEGRATIONS_OPENAI_API_KEY=AI_INTEGRATIONS_OPENAI_API_KEY:latest,AI_INTEGRATIONS_OPENAI_BASE_URL=AI_INTEGRATIONS_OPENAI_BASE_URL:latest,AI_INTEGRATIONS_ANTHROPIC_API_KEY=AI_INTEGRATIONS_ANTHROPIC_API_KEY:latest,AI_INTEGRATIONS_GEMINI_API_KEY=AI_INTEGRATIONS_GEMINI_API_KEY:latest,AI_INTEGRATIONS_GEMINI_BASE_URL=AI_INTEGRATIONS_GEMINI_BASE_URL:latest,GEMINI_API_KEY=GEMINI_API_KEY:latest,DEEPSEEK_API_KEY=DEEPSEEK_API_KEY:latest,BRAVE_SEARCH_API_KEY=BRAVE_SEARCH_API_KEY:latest,EMAIL_LIST_VERIFY_API_KEY=EMAIL_LIST_VERIFY_API_KEY:latest,PSE_GOOGLE=PSE_GOOGLE:latest,GOOGLE_SEARCH_ENGINE_ID=GOOGLE_SEARCH_ENGINE_ID:latest,GOOGLE_SEARCH_API_KEY=GOOGLE_SEARCH_API_KEY:latest,MICROSOFT_CLIENT_ID=MICROSOFT_CLIENT_ID:latest,MICROSOFT_CLIENT_SECRET=MICROSOFT_CLIENT_SECRET:latest,MICROSOFT_TENANT_ID=MICROSOFT_TENANT_ID:latest,COMPANIES_HOUSE_API_KEY=COMPANIES_HOUSE_API_KEY:latest,GOOGLE_AUTH_CLIENT_ID=GOOGLE_AUTH_CLIENT_ID:latest,GOOGLE_CLIENT_SECRET=GOOGLE_CLIENT_SECRET:latest,TELNYX_API_KEY=TELNYX_API_KEY:latest,TELNYX_CONNECTION_ID=TELNYX_CONNECTION_ID:latest,TELNYX_FROM_NUMBER=TELNYX_FROM_NUMBER:latest,TELNYX_CALL_CONTROL_APP_ID=TELNYX_CALL_CONTROL_APP_ID:latest,TELNYX_SIP_CONNECTION_ID=TELNYX_SIP_CONNECTION_ID:latest,TELNYX_SIP_PASSWORD=TELNYX_SIP_PASSWORD:latest,TELNYX_SIP_USERNAME=TELNYX_SIP_USERNAME:latest,TELNYX_WEBRTC_USERNAME=TELNYX_WEBRTC_USERNAME:latest,TELNYX_WEBRTC_PASSWORD=TELNYX_WEBRTC_PASSWORD:latest,REDIS_URL=REDIS_URL:latest,MAILGUN_API_KEY=MAILGUN_API_KEY:latest,MAILGUN_DOMAIN=MAILGUN_DOMAIN:latest,DEEPGRAM_API_KEY=DEEPGRAM_API_KEY:latest,ORG_INTELLIGENCE_OPENAI_MODEL=ORG_INTELLIGENCE_OPENAI_MODEL:latest,ORG_INTELLIGENCE_GEMINI_MODEL=ORG_INTELLIGENCE_GEMINI_MODEL:latest,ORG_INTELLIGENCE_CLAUDE_MODEL=ORG_INTELLIGENCE_CLAUDE_MODEL:latest,ORG_INTELLIGENCE_SYNTH_PROVIDER=ORG_INTELLIGENCE_SYNTH_PROVIDER:latest,ORG_INTELLIGENCE_SYNTH_MODEL=ORG_INTELLIGENCE_SYNTH_MODEL:latest,ORG_INTELLIGENCE_OPENAI_MAX_TOKENS=ORG_INTELLIGENCE_OPENAI_MAX_TOKENS:latest,ORG_INTELLIGENCE_GEMINI_MAX_OUTPUT_TOKENS=ORG_INTELLIGENCE_GEMINI_MAX_OUTPUT_TOKENS:latest,ORG_INTELLIGENCE_CLAUDE_MAX_TOKENS=ORG_INTELLIGENCE_CLAUDE_MAX_TOKENS:latest'

images:
  - 'gcr.io/$PROJECT_ID/demandgentic-api:latest'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

timeout: '1800s'
