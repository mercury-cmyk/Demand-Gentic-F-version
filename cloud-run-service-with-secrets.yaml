apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: demandgentic-api
  labels:
    cloud.googleapis.com/location: us-central1
  annotations:
    run.googleapis.com/ingress: all
    run.googleapis.com/ingress-status: all
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "10"
        run.googleapis.com/cpu-throttling: "false"
        run.googleapis.com/startup-cpu-boost: "true"
        run.googleapis.com/vpc-access-connector: projects/gen-lang-client-0789558283/locations/us-central1/connectors/pivotal-connector
        run.googleapis.com/vpc-access-egress: private-ranges-only
    spec:
      containerConcurrency: 80
      timeoutSeconds: 300
      serviceAccountName: gen-lang-client-0789558283@appspot.gserviceaccount.com
      containers:
        - image: gcr.io/gen-lang-client-0789558283/demandgentic-api:latest
          ports:
            - name: http1
              containerPort: 5000
          resources:
            limits:
              cpu: "2"
              memory: 2Gi
          env:
            # Static configs (non-sensitive)
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "5000"
            - name: ENABLE_LOG_STREAMING
              value: "true"
            - name: GOOGLE_CLOUD_PROJECT
              value: "gen-lang-client-0789558283"
            - name: GCP_PROJECT_ID
              value: "gen-lang-client-0789558283"
            - name: GCS_PROJECT_ID
              value: "gen-lang-client-0789558283"
            - name: VERTEX_AI_LOCATION
              value: "us-central1"
            - name: USE_VERTEX_AI
              value: "true"
            - name: AI_INTEGRATIONS_OPENAI_BASE_URL
              value: "https://api.openai.com/v1"
            - name: AI_INTEGRATIONS_GEMINI_BASE_URL
              value: "https://generativelanguage.googleapis.com"
            
            # =====================================================
            # SECRETS FROM GOOGLE CLOUD SECRET MANAGER
            # =====================================================
            
            # Session & Auth
            - name: SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: SESSION_SECRET
                  key: latest
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: JWT_SECRET
                  key: latest
            
            # Database
            - name: PGDATABASE
              valueFrom:
                secretKeyRef:
                  name: PGDATABASE
                  key: latest
            - name: PGHOST
              valueFrom:
                secretKeyRef:
                  name: PGHOST
                  key: latest
            - name: PGPORT
              valueFrom:
                secretKeyRef:
                  name: PGPORT
                  key: latest
            - name: PGUSER
              valueFrom:
                secretKeyRef:
                  name: PGUSER
                  key: latest
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: PGPASSWORD
                  key: latest
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: DATABASE_URL
                  key: latest
            
            # OpenAI
            - name: AI_INTEGRATIONS_OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: AI_INTEGRATIONS_OPENAI_API_KEY
                  key: latest
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: OPENAI_API_KEY
                  key: latest
            - name: OPENAI_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: OPENAI_WEBHOOK_SECRET
                  key: latest
            
            # Gemini
            - name: AI_INTEGRATIONS_GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: AI_INTEGRATIONS_GEMINI_API_KEY
                  key: latest
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: GEMINI_API_KEY
                  key: latest
            
            # Anthropic
            - name: AI_INTEGRATIONS_ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: AI_INTEGRATIONS_ANTHROPIC_API_KEY
                  key: latest
            
            # DeepSeek
            - name: DEEPSEEK_API_KEY
              valueFrom:
                secretKeyRef:
                  name: DEEPSEEK_API_KEY
                  key: latest
            
            # Telnyx
            - name: TELNYX_API_KEY
              valueFrom:
                secretKeyRef:
                  name: TELNYX_API_KEY
                  key: latest
            - name: TELNYX_CONNECTION_ID
              valueFrom:
                secretKeyRef:
                  name: TELNYX_CONNECTION_ID
                  key: latest
            - name: TELNYX_FROM_NUMBER
              valueFrom:
                secretKeyRef:
                  name: TELNYX_FROM_NUMBER
                  key: latest
            - name: TELNYX_WEBRTC_USERNAME
              valueFrom:
                secretKeyRef:
                  name: TELNYX_WEBRTC_USERNAME
                  key: latest
            - name: TELNYX_WEBRTC_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: TELNYX_WEBRTC_PASSWORD
                  key: latest
            - name: TELNYX_CALL_CONTROL_APP_ID
              valueFrom:
                secretKeyRef:
                  name: TELNYX_CALL_CONTROL_APP_ID
                  key: latest
            - name: TELNYX_TEXML_APP_ID
              valueFrom:
                secretKeyRef:
                  name: TELNYX_TEXML_APP_ID
                  key: latest
            
            # URLs
            - name: BASE_URL
              valueFrom:
                secretKeyRef:
                  name: BASE_URL
                  key: latest
            - name: TELNYX_WEBHOOK_URL
              valueFrom:
                secretKeyRef:
                  name: TELNYX_WEBHOOK_URL
                  key: latest
            - name: PUBLIC_WEBSOCKET_URL
              valueFrom:
                secretKeyRef:
                  name: PUBLIC_WEBSOCKET_URL
                  key: latest
            - name: PUBLIC_WEBHOOK_HOST
              valueFrom:
                secretKeyRef:
                  name: PUBLIC_WEBHOOK_HOST
                  key: latest
            
            # Search APIs
            - name: BRAVE_SEARCH_API_KEY
              valueFrom:
                secretKeyRef:
                  name: BRAVE_SEARCH_API_KEY
                  key: latest
            - name: GOOGLE_SEARCH_API_KEY
              valueFrom:
                secretKeyRef:
                  name: GOOGLE_SEARCH_API_KEY
                  key: latest
            - name: GOOGLE_SEARCH_ENGINE_ID
              valueFrom:
                secretKeyRef:
                  name: GOOGLE_SEARCH_ENGINE_ID
                  key: latest
            - name: PSE_GOOGLE
              valueFrom:
                secretKeyRef:
                  name: PSE_GOOGLE
                  key: latest
            - name: EMAIL_LIST_VERIFY_API_KEY
              valueFrom:
                secretKeyRef:
                  name: EMAIL_LIST_VERIFY_API_KEY
                  key: latest
            
            # Third Party APIs
            - name: COMPANIES_HOUSE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: COMPANIES_HOUSE_API_KEY
                  key: latest
            - name: GOOGLE_AUTH_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: GOOGLE_AUTH_CLIENT_ID
                  key: latest
            - name: GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: GOOGLE_CLIENT_SECRET
                  key: latest
            
            # Microsoft Auth
            - name: MICROSOFT_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: MICROSOFT_CLIENT_ID
                  key: latest
            - name: MICROSOFT_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: MICROSOFT_CLIENT_SECRET
                  key: latest
            - name: MICROSOFT_TENANT_ID
              valueFrom:
                secretKeyRef:
                  name: MICROSOFT_TENANT_ID
                  key: latest
            
            # Email
            - name: MAILGUN_API_KEY
              valueFrom:
                secretKeyRef:
                  name: MAILGUN_API_KEY
                  key: latest
            - name: MAILGUN_DOMAIN
              valueFrom:
                secretKeyRef:
                  name: MAILGUN_DOMAIN
                  key: latest
            
            # Redis
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: REDIS_URL
                  key: latest
            
            # Storage
            - name: GCS_BUCKET
              valueFrom:
                secretKeyRef:
                  name: GCS_BUCKET
                  key: latest
            - name: S3_REGION
              valueFrom:
                secretKeyRef:
                  name: S3_REGION
                  key: latest
            
            # Voice Provider Configuration
            - name: VOICE_PROVIDER
              valueFrom:
                secretKeyRef:
                  name: VOICE_PROVIDER
                  key: latest
            - name: GEMINI_LIVE_MODEL
              valueFrom:
                secretKeyRef:
                  name: GEMINI_LIVE_MODEL
                  key: latest
            
            # Model Configuration
            - name: ORG_INTELLIGENCE_OPENAI_MODEL
              valueFrom:
                secretKeyRef:
                  name: ORG_INTELLIGENCE_OPENAI_MODEL
                  key: latest
            - name: ORG_INTELLIGENCE_GEMINI_MODEL
              valueFrom:
                secretKeyRef:
                  name: ORG_INTELLIGENCE_GEMINI_MODEL
                  key: latest
            - name: ORG_INTELLIGENCE_CLAUDE_MODEL
              valueFrom:
                secretKeyRef:
                  name: ORG_INTELLIGENCE_CLAUDE_MODEL
                  key: latest
            - name: CONVERSATION_QUALITY_MODEL
              valueFrom:
                secretKeyRef:
                  name: CONVERSATION_QUALITY_MODEL
                  key: latest

            # SIP / Drachtio Configuration
            - name: USE_SIP_CALLING
              value: "true"
            - name: PUBLIC_IP
              value: "136.116.91.227"
            - name: DRACHTIO_HOST
              value: "drachtio"
            - name: DRACHTIO_PORT
              value: "9022"
            - name: SIP_LISTEN_PORT
              value: "5060"
            - name: SIP_LISTEN_HOST
              value: "0.0.0.0"
            - name: RTP_PORT_MIN
              value: "10000"
            - name: RTP_PORT_MAX
              value: "20000"
            - name: TELNYX_SIP_USERNAME
              valueFrom:
                secretKeyRef:
                  name: TELNYX_SIP_USERNAME
                  key: latest
            - name: TELNYX_SIP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: TELNYX_SIP_PASSWORD
                  key: latest
            - name: TELNYX_SIP_CONNECTION_ID
              valueFrom:
                secretKeyRef:
                  name: TELNYX_SIP_CONNECTION_ID
                  key: latest

  traffic:
    - percent: 100
      latestRevision: true
