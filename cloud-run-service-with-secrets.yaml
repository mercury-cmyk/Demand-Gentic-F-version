apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: demandgentic-api
  labels:
    cloud.googleapis.com/location: us-central1
  annotations:
    run.googleapis.com/ingress: all
    run.googleapis.com/ingress-status: all
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "10"
        run.googleapis.com/cpu-throttling: "false"
        run.googleapis.com/startup-cpu-boost: "true"
    spec:
      containerConcurrency: 80
      timeoutSeconds: 300
      serviceAccountName: pivotalb2b-2026@appspot.gserviceaccount.com
      containers:
        - image: gcr.io/pivotalb2b-2026/demandgentic-api:latest
          ports:
            - name: http1
              containerPort: 5000
          resources:
            limits:
              cpu: "2"
              memory: 2Gi
          env:
            # Static configs (non-sensitive)
            - name: NODE_ENV
              value: "production"
            
            # Secrets from Secret Manager
            - name: SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: SESSION_SECRET
                  key: latest
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: JWT_SECRET
                  key: latest
            - name: PGDATABASE
              valueFrom:
                secretKeyRef:
                  name: PGDATABASE
                  key: latest
            - name: PGHOST
              valueFrom:
                secretKeyRef:
                  name: PGHOST
                  key: latest
            - name: PGPORT
              valueFrom:
                secretKeyRef:
                  name: PGPORT
                  key: latest
            - name: PGUSER
              valueFrom:
                secretKeyRef:
                  name: PGUSER
                  key: latest
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: PGPASSWORD
                  key: latest
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: DATABASE_URL
                  key: latest
            - name: AI_INTEGRATIONS_OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: AI_INTEGRATIONS_OPENAI_API_KEY
                  key: latest
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: OPENAI_API_KEY
                  key: latest
            - name: OPENAI_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: OPENAI_WEBHOOK_SECRET
                  key: latest
            - name: AI_INTEGRATIONS_GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: AI_INTEGRATIONS_GEMINI_API_KEY
                  key: latest
            - name: GEMINI_API_KEY
